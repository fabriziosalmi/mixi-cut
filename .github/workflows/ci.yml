name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]"

      - name: Lint
        run: ruff check src/ tests/

      - name: Test
        run: pytest tests/ -v --tb=short --cov=mixi_cut --cov-report=term-missing

      - name: Generate test WAV
        run: mixi-cut generate --duration 10 --output /tmp/test.wav

      - name: Verify test WAV
        run: mixi-cut verify /tmp/test.wav --strict

      - name: Backward compat check
        run: python generate.py --duration 10 --output /tmp/compat.wav

  c-decoder:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build C decoder
        run: |
          cd decoder_c
          cc -std=c99 -O2 -Wall -Wextra -Werror -Iinclude -o test_decoder test/test_decoder.c src/mixi_decoder.c -lm

      - name: Test C decoder
        run: decoder_c/test_decoder

  rust-decoder:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build and test
        run: |
          cd decoder_rust
          cargo test --release
          cargo build --release --bin mixi-decode

      - name: Cross-language roundtrip
        run: |
          pip install -e .
          mixi-cut generate --duration 10 --output /tmp/roundtrip.wav
          decoder_rust/target/release/mixi-decode /tmp/roundtrip.wav

  benchmark:
    runs-on: ubuntu-latest
    needs: [python, c-decoder, rust-decoder]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]"

      - name: Run benchmark
        run: python benchmark.py --no-color --compare

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark_results/
